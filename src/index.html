<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Alrededor de los EE.UU." />
  <meta name="author" content="Ivan Garduño" />
  <meta name="keywords" content="html, css, javascript" />
  <title>Alrededor de los EE.UU.</title>
  <link rel="stylesheet" href="./page/index.css" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
</head>

<body>
  <div class="page">
    <div class="popup" id="popup-image">
   <div class="popup__container">
    <button type="button" class="popup__button popup__button_close">&#x1F7A9;</button>
    <div class="popup__content-image">
      <img class="popup__image" src="#" alt="" />
    </div>
    <div class="popup__paragraph-content">
      <p class="popup__paragraph"></p>
     </div>
    </div>
   </div>
        <div class="popup" id="popup-edit">
  <div class="popup__container">
    <button
      type="button"
      class="popup__button popup__button_close">
    </button>

    <form class="popup__form form-edit">
      <h2 class="popup__subtitle">
        Editar perfil
      </h2>

      <label class="popup__field">
        <input
          name="name"
          type="text"
          class="popup__input popup__input_name"
          placeholder="Nombre"
          minlength="2"
          maxlength="40"
          id="name-input"
          required
        />
        <span class="popup__input-error name-input-error"></span>
      </label>

      <label class="popup__field">
        <input
          name="about"
          type="text"
          class="popup__input popup__input_about"
          placeholder="Acerca de mí"
          minlength="2"
          maxlength="200"
          id="about-input"
          required
        />
        <span class="popup__input-error about-input-error"></span>
      </label>
            <button type="submit" class="popup__button popup__button_save">
              Guardar
            </button>
          </form>
          </div>
          </div>
        <div class="popup" id="popup-add">
  <div class="popup__container">
    <button
      type="button"
      class="popup__button popup__button_close"
    ></button>

    <form class="popup__form form-add">
      <h2 class="popup__subtitle">Nuevo lugar</h2>

      <label class="popup__field">
        <input
          name="title"
          type="text"
          class="popup__input popup__input_title"
          placeholder="Título"
          minlength="2"
          maxlength="30"
          id="title-input"
          required
        />
        <span class="popup__input-error title-input-error"></span>
      </label>

      <label class="popup__field">
        <input
          name="link"
          type="url"
          class="popup__input popup__input_url"
          placeholder="URL de la imagen"
          id="url-input"
          required
        />
        <span class="popup__input-error url-input-error"></span>
      </label>

      <button
        type="submit"
        class="popup__button popup__button_add"
      >
        Guardar
      </button>
    </form>
  </div>
</div>

<div class="popup" id="popup-confirm">
  <div class="popup__container">
    <button
      type="button"
      class="popup__button popup__button_close"
    ></button>

    <form class="popup__form form-confirm" name="confirm-delete">
      <h2 class="popup__subtitle">¿Estás seguro?</h2>

      <button
        type="submit"
        class="popup__button popup__button_confirm"
      >
        Sí
      </button>
    </form>
  </div>
</div>
    <div class="popup" id="popup-avatar">
  <div class="popup__container">
    <button
      type="button"
      class="popup__button popup__button_close"
      aria-label="Cerrar"
    ></button>

    <form class="popup__form form-avatar">
      <h2 class="popup__subtitle">Cambiar foto de perfil</h2>

      <label class="popup__field">
        <input
          name="avatar"
          type="url"
          class="popup__input popup__input_avatar"
          placeholder="URL de la imagen"
          id="avatar-input"
          required
        />
        <span class="popup__input-error avatar-input-error"></span>
      </label>

      <button
        type="submit"
        class="popup__button popup__button_save"
      >
        Guardar
      </button>
    </form>
  </div>
</div>

    <header class="header">
      <img src="./images/Vector.svg" alt="logo-page" class="header__image" />
    </header>
    <main class="main">
      <div class="main__profile">
        <div class="main__content-image">
          <img src="./images/JacquesCousteau.jpg" alt="profile-image" class="main__profile-image" />
          <button
    type="button"
    class="main__button main__button_avatar"
    aria-label="Editar foto de perfil"
  >
    ✎
  </button>
</div>
        <div class="main__content-paragraph">
          <p class="main__paragraph main__paragraph_name">Jacques Cousteau</p>
          <p class="main__paragraph main__paragraph_about">Explorador</p>
          <button type="button" class="main__button main__button_edit">
            &#x1F58C;
          </button>
        </div>
        <button type="button" class="main__button main__button_add">
          &#x1F7A3;
        </button>
      </div>
      <div class="main__gallery"></div>
    </main>
    <template id="main__template">
      <div class="main__gallery-card">
        <img class="main__gallery-image" />
        <button type="button" class="main__button main__button_trash"></button>
        <div class="main__gallery-content">
          <p class="main__gallery-paragraph"></p>
          <button type="button" class="main__button main__button_like"></button>
        </div>
      </div>
    </template>
    <footer class="footer">
      <p class="footer__copyright">&#x00a9; 2024 Around The U.S.</p>
    </footer>
  </div>
  <script type="module" src="./page/index.js"></script>
</body>

</html>
